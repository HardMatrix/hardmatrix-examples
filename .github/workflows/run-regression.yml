name: run-regression

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # Daily at 04:00 UTC.
    - cron: "0 4 * * *"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  axis-eth-fcs:
    name: AXI Ethernet FCS Example
    runs-on: self-hosted
    env:
      UV_PROJECT_ENVIRONMENT: .venv
      COCOTB_IGNORE_PYTHON_REQUIRES: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true
          persist-credentials: false

      - name: Verify system dependencies
        run: |
          verilator --version
          uv --version

      - name: Install Python dependencies
        run: uv sync

      - name: Run AXI Ethernet FCS test
        run: |
          uv run fusesoc \
            --config=fusesoc.conf \
            --cores-root=examples/axis-eth-fcs \
            --cores-root=shared/rtl/axis-if \
            run --target test hardmatrix:examples:axis_eth_fcs_insert:0.1.0

  pytorch-hw:
    name: PyTorch Example RTL
    runs-on: self-hosted
    env:
      UV_PROJECT_ENVIRONMENT: .venv
      COCOTB_IGNORE_PYTHON_REQUIRES: 1
    defaults:
      run:
        working-directory: examples/pytorch-custom-device
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true
          persist-credentials: false

      - name: Verify system dependencies
        run: |
          verilator --version
          java -version
          mill version
          uv --version

      - name: Install Python dependencies
        run: uv sync

      - name: Run hardware tests
        run: make test-hw

  pytorch-mock:
    name: PyTorch Example Mock Driver
    runs-on: self-hosted
    needs: pytorch-hw
    env:
      UV_PROJECT_ENVIRONMENT: .venv
    defaults:
      run:
        working-directory: examples/pytorch-custom-device
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true
          persist-credentials: false

      - name: Install Python dependencies
        run: uv sync

      - name: Build PyTorch extension
        run: uv pip install -e . --no-build-isolation

      - name: Build and load mock driver
        run: |
          make -C cpp/driver
          sudo rmmod tensor 2>/dev/null || true
          sudo insmod cpp/driver/tensor.ko mock=1 debug=0 mock_autocreate=1 device_mode=0666

      - name: Run mock-driver tests
        run: .venv/bin/pytest tests/test_pytorch_mock.py -v

      - name: Unload mock driver
        if: always()
        run: sudo rmmod tensor 2>/dev/null || true

  pytorch-remote:
    name: PyTorch Example Remote Path
    runs-on: self-hosted
    needs: pytorch-mock
    env:
      UV_PROJECT_ENVIRONMENT: .venv
    defaults:
      run:
        working-directory: examples/pytorch-custom-device
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true
          persist-credentials: false

      - name: Verify Renode
        run: renode --version

      - name: Verify Buildroot checkout
        run: |
          test -d "${HOME}/buildroot/.git" || {
            echo "ERROR: Buildroot not found at ${HOME}/buildroot"
            echo "Install once on runner: git clone https://github.com/buildroot/buildroot.git ${HOME}/buildroot"
            exit 1
          }

      - name: Bootstrap Buildroot output
        run: |
          BUILDROOT_DIR="${HOME}/buildroot"
          KDIR="${BUILDROOT_DIR}/output/build/linux-6.18.7"
          if [ -d "$KDIR" ]; then
            echo "Buildroot kernel tree found: $KDIR"
          else
            echo "::warning::Buildroot kernel tree not found at $KDIR. Running one-time cold build."
            BUILDROOT_DIR="$BUILDROOT_DIR" ./renode/buildroot/build.sh full
          fi

      - name: Build Renode guest artifacts
        run: BUILDROOT_DIR="${HOME}/buildroot" make renode-build

      - name: Install Python dependencies
        run: uv sync

      - name: Build PyTorch extension
        run: uv pip install -e . --no-build-isolation

      - name: Run remote tests
        run: make test-remote

      - name: Upload remote logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: remote-test-logs
          path: |
            examples/pytorch-custom-device/out/tensor_soc_uart0.log
            examples/pytorch-custom-device/out/renode-process.log
            examples/pytorch-custom-device/out/renode-monitor.log
